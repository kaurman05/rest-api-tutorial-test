$kind: http-request
name: Update User
method: PATCH
url: '{{baseUrl}}/users/{{userId}}'
order: 4000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "firstName": "Jane"
    }
