$kind: http-request
url: "{{baseUrl}}/users/:userId"
method: PATCH
headers:
  Content-Type: application/json
  Authorization: Bearer {{accessToken}}
pathVariables:
  userId: "{{userId}}"
body:
  type: json
  content: |-
    {
      "firstName": "Jane",
      "lastName": "Smith",
      "email": "jane.smith@example.com"
    }
order: 4000
