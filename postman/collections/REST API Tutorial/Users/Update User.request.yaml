$kind: http-request
name: Update User
method: PATCH
url: '{{baseUrl}}/users/:userId'
order: 4000
pathVariables:
  - key: userId
    value: '{{userId}}'
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{accessToken}}'
body:
  type: json
  content: |-
    {
      "firstName": "Jane",
      "lastName": "Smith",
      "email": "jane.smith@example.com"
    }
