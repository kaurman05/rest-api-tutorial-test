$kind: http-request
url: "{{baseUrl}}/users"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "firstName": "John",
      "lastName": "Doe",
      "email": "john.doe@example.com",
      "password": "securePassword123"
    }
scripts:
  - type: afterResponse
    code: |-
      const response = pm.response.json();
      if (response.id) {
        pm.collectionVariables.set("userId", response.id);
      }
    language: text/javascript
order: 1000
