$kind: http-request
name: Refresh Token
method: POST
url: '{{baseUrl}}/auth/refresh'
order: 2000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "refresh_token": "{{refreshToken}}"
    }
scripts:
  - type: afterResponse
    code: |-
      const response = pm.response.json();
      pm.collectionVariables.set('accessToken', response.id);
    language: text/javascript
